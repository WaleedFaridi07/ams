services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ams
      POSTGRES_USER: ams
      POSTGRES_PASSWORD: ams
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams -d ams"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
